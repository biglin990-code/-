<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海洋奇緣｜垃圾回收挑戰</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>
<div class="top">
  <h1>海洋垃圾回收挑戰</h1>
  <p>用滑鼠控制垃圾桶，接住垃圾！<br>每個 +20 分，漏接 -40 分，30 秒挑戰！</p>
</div>

<div class="info">
  分數：<span id="score">0</span>
  ｜ 時間：<span id="time">30</span>
</div>

<div id="gameArea">
  <div id="player"></div>

  <div id="startScreen">
    <h2>準備開始</h2>
    <p>滑鼠移動控制垃圾桶</p>
    <button type="button" onclick="startGame()">開始遊戲</button>
    <a href="index.html">回首頁</a>
  </div>

  <div id="endScreen" style="display:none;">
    <h2>挑戰成功！</h2>
    <p>總分：<span id="finalScore">0</span></p>
    <button type="button" onclick="startGame()">再來一次</button>
    <a href="index.html">回首頁</a>
  </div>
</div>

<script src="script/game.js"></script>
</body>
</html>
